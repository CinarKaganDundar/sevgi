<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Senin İçin ❤️</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ffd6e7,#fff0f6);
    font-family:Arial,sans-serif;
    overflow:hidden;
}

.container{
    text-align:center;
    position:relative;
    padding:20px;
}

.cat{
    width:120px;
    margin-bottom:20px;
}

h1{
    color:#ff4d88;
    font-size:38px;
    margin-bottom:10px;
}

p{
    color:#555;
    margin-bottom:30px;
}

.buttons{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:20px;
    position:relative;
}

button{
    border:none;
    padding:15px 30px;
    border-radius:30px;
    font-size:20px;
    cursor:pointer;
    transition:0.3s;
}

#yes{
    background:#ff4d88;
    color:white;
}

#no{
    background:white;
    color:#ff4d88;
    position:relative;
}

.heart{
    position:absolute;
    font-size:20px;
    animation:float 4s linear infinite;
}

@keyframes float{
    from{
        transform:translateY(0);
        opacity:1;
    }
    to{
        transform:translateY(-700px);
        opacity:0;
    }
}
</style>
</head>
<body>

<div class="container">

    <img class="cat" src="cat-fofo.gif" alt="Pixel Cat">

    <h1>Beni seviyor musun? ❤️</h1>
    <p>Doğru cevap belli bence :)</p>

    <div class="buttons">
        <button id="yes" onclick="yesClick()">Evet 💖</button>
        <button id="no" onclick="moveNo()">Hayır 😢</button>
    </div>

</div>

<script>
let scale = 1;

function moveNo(){
    const noBtn = document.getElementById("no");

    let x = Math.random() * 250 - 125;
    let y = Math.random() * 150 - 75;

    noBtn.style.transform = `translate(${x}px, ${y}px)`;

    scale += 0.2;
    document.getElementById("yes").style.transform = `scale(${scale})`;
}

function yesClick(){
    document.body.innerHTML = `
    <div style="text-align:center;">
        <img src="cat-fofo.gif" width="140">
        <h1 style="color:#ff4d88;">Biliyordum ❤️</h1>
        <p>Sen benim en güzel hikâyemsin.</p>
    </div>
    `;
}

function createHeart(){
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * window.innerWidth + "px";
    heart.style.top = window.innerHeight + "px";

    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 4000);
}

setInterval(createHeart, 500);
</script>

</body>
</html>
